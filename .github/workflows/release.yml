name: release

# Tag a version (vX.Y.Z) → CI builds the binaries AND all container images
# (multi-arch) and publishes them to GHCR. Images are NOT built locally.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub release + upload binaries
  packages: write   # push images to ghcr.io (GITHUB_TOKEN has the scope in Actions)

jobs:
  # ── cross-platform binaries via goreleaser ───────────────────────────────────
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', cache: false }
      - uses: goreleaser/goreleaser-action@v6
        with: { version: '~> v2', args: release --clean }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

  # ── multi-arch images: femto + the sandbox tiers → GHCR ──────────────────────
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: femto
            file: Dockerfile
            context: .
          - name: femto-sbx-lite
            file: infra/sandbox/Dockerfile.lite
            context: infra/sandbox
          - name: femto-sbx-crypto
            file: infra/sandbox/Dockerfile.crypto
            context: infra/sandbox
          - name: femto-sbx-pwn
            file: infra/sandbox/Dockerfile.pwn
            context: infra/sandbox
          - name: femto-sbx-full
            file: infra/sandbox/Dockerfile.full
            context: infra/sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3   # for arm64 runtime-image layers
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
