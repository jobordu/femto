name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false   # zero deps → nothing to cache
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo 'run gofmt -w .'; gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: test + coverage
        run: |
          go test -race -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -1
      - name: build
        run: CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o /dev/null ./cmd/femto
